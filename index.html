<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Random Chance for Points</title>
        <link rel="stylesheet" href="main.css">
    </head>
    <body>
        <h1>Random Chance for Points</h1>
        Points: <span id="points">0</span>
        Numbers: <span id="numbers">0</span>
        <label for="number-input">Chance for points:</label>
        <input type="number" id="number-input" min="2" step="1" required>
        <button id="add-number"  onclick="addNumber()">Add Number</button>
        <button id="generate-random" onclick="generateRandom()">Generate Random</button>
        <script src="index.js"></script>
    </body>
</html>
